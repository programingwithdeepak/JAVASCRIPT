<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let user = prompt("enter");
        if (user == 'a') {
            console.log("apple");
        }
        else if (user == 'b') {
            console.log("banana");
        }
        else if (user == 'c') {
            console.log("cat");
        }
        else if (user == 'd') {
            console.log("dog");
        }
        else if (user == 'e') {
            console.log("egg");
        }
        else
            console.log("no match");
    </script>
</body>

</html>
