<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .row{
            display: flex;
            gap: 10px;
        }
        .box{
            border: 2px solid;
            border-radius: 20%;
            width: 150px;
            height: 150px;
            padding: 4%;

        }
    </style>
</head>
<body>
    <div class="row">
        <script>
            let data =["html","css","javascript","react","node"];
            let count = 0;
            while(count<=4){
                document.write(`<div class="box"> 
                    <h1>${count}</h1>
                    <h2>${data[count]}</h2>
                    </div>`);
                    count++
            }
        </script>
    </div>
</body>
</html>
