<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let table = prompt("enter any table");
        let count =1;
        while(count<=10){
            document.write(` <h1>${table} * ${count} = ${table*count}</h1>`);
            count++;
        }
    </script>
</body>
</html>
