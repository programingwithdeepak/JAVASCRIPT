<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Object: Represents a collection of key-value pairs and is used to store more complex data. Objects can be created using the new Object( ) syntax or object literals { }.

            // type 1

            const objs = {
                id: 1,
                name: "user1",
                email: "user1@gmail.com"
            }

            console.log(objs);
            console.log(objs.id);
            console.log(objs.email);

            // type 2

            const bag = {};
            bag.item1 = "html";
            bag.item2 = "css";

            console.log(`<h1>${bag}</h1>`);

            bag.item3 = "html 5";
            bag.item4 = "css 3";

            console.log(`<h1>${typeof bag}</h1>`);



            //  type 3

            const final = new Object();

            final.item3 = "html 5";
            final.item4 = "css 3";

            
            console.log(`<h1>${final}</h1`);



















        

    </script>
</body>
</html>
