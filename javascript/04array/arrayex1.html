    <script>
        // Array: Represents an ordered list of values. Arrays can contain any combination of data types and are created using square brackets [ ].

            let num1 = 1;
            let num2 = 2;
            let num3 = 3;
            let num4 = 4;
            let num5 = 5;

            //  type 1

            const datas = Array(1, 2, 3, 4, 5, "ducat", "india");
            document.write(`<h1> ${datas}</h1>`);

             document.write(`<h1> ${datas[5]}</h1>`);
            document.write(`<h1> ${datas[2] + datas[3]}</h1>`);

            


            //  type 2
            const courses = [1, 2, 3, 4, 5];
            document.write(`<h1> ${courses}</h1>`);
    

            document.write(`<h1> ${courses[0]}</h1>`);

            document.write(`<h1> ${typeof courses}</h1>`);
            //  type 3

            const techs = new Array('html', "css", "js");

            document.write(`<h1> ${techs}</h1>`);



            // Nested Array

            const numbers = [1, 2, 3, 4, 5, [10, 20, 30, 40, [50, 60], 80, 90], 100, 101];

            document.write(`<h1>${numbers}</h1>`);
            document.write(`<h1> ${numbers[4]}</h1>`);
            document.write(`<h1>${numbers[5][0]} </h1>`);
            document.write(`<h1>${numbers[5][4][0]}</h1>`);
            document.write(`<h1> ${numbers[6]} </h1>`);

            // spred oprater (.) current dir  (..) out side of the dir (...) spred

            const data1 = [1, 2, 3, 4, 5];

            const data2 = ['a', "b", "c"];

            // const res = [data1, data2];

            // const res = [data1[0], data1[1], data1[2], data1[3], data1[4], data2[0], data2[1], data2[2]];

            const res = [...data1, ...data2];

            document.write(`<h1>${res}</h1>`);
