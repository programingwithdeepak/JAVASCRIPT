<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1 style="color:red;" id="title">welcome to html with css</h1>

    <button onclick="document.getElementById('title').style.color='tomato'">tomato</button>
    <button onclick="document.getElementById('title').style.color='teal'">teal</button>

    <br><br>
    <button onclick="document.getElementById('title').style.textAlign='left'">left</button>
    <button onclick="document.getElementById('title').style.textAlign='center'">center</button>
    <button onclick="document.getElementById('title').style.textAlign='right'">right</button>

    <br><br>
    <button onclick="document.getElementById('title').style.fontSize='6rem'">large</button>
    <button onclick="document.getElementById('title').style.fontSize='4rem'">mid</button>
    <button onclick="document.getElementById('title').style.fontSize='1rem'">small</button>






    <script>
        document.getElementById('title').style.color = "blue";
    </script>

</body>

</html>
