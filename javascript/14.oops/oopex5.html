<!DOCTYPE html>
<html lang="en">
    <style>
        * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background-color: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 500px;
  background-color: #ff9900; /* orange box */
  border-radius: 5px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

.card-img {
  width: 100%;
  height: 280px;
  object-fit: cover;
}

.card-content {
  padding: 15px 20px;
}

.card-content h2 {
  font-size: 22px;
  margin-bottom: 10px;
  color: #000;
}

.card-content h3 {
  font-size: 24px;
  font-weight: bold;
  color: #000;
  margin-bottom: 10px;
}

.card-content p {
  font-size: 14px;
  line-height: 1.5;
  color: #1a1a1a;
  text-align: justify;
}

    </style>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="style.css">
</head>
